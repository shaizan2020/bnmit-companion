name: bnmit_companion
description: BNMIT Companion - Your academic dashboard for Contineo portal
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  
  # Networking & Scraping
  dio: ^5.4.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  html: ^0.15.4

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^14.2.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.68.0

  # Notifications
  flutter_local_notifications: ^17.2.3


  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^6.0.5

  # Icons
  cupertino_icons: ^1.0.8
  material_design_icons_flutter: ^7.0.7296

  # PDF & Share
  pdf: ^3.11.0
  printing: ^5.13.1
  share_plus: ^10.1.4
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  open_file: ^3.5.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
